x-local-credentials:
  mysql-root-password: &mysql_root_password ecohub
  mysql-database: &mysql_database eco
  mysql-user: &mysql_user eco
  mysql-password: &mysql_password ecohub
  redis-password: &redis_password ecohub

services:
  mysql:
    container_name: Eco-mysql
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: *mysql_root_password
      MYSQL_DATABASE: *mysql_database
      MYSQL_USER: *mysql_user
      MYSQL_PASSWORD: *mysql_password
    volumes:
      - eco-mysql-data:/var/lib/mysql
    networks:
      - Eco-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    container_name: Eco-redis
    image: redis:7.4-alpine
    restart: always
    environment:
      REDIS_PASSWORD: *redis_password
    command: ["redis-server", "--requirepass", *redis_password]
    volumes:
      - eco-redis-data:/data
    networks:
      - Eco-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    container_name: Eco-web
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: http://server:8080
    environment:
      API_URL: http://server:8080
    restart: always
    ports:
      - 3000:3000
    networks:
      - Eco-network
    depends_on:
      server:
        condition: service_healthy

  server:
    container_name: Eco-server
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 8080
      JWT_SECRET: ecohub_2026!local@dev_secret$001
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: *mysql_user
      MYSQL_PASSWORD: *mysql_password
      MYSQL_DBNAME: *mysql_database
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: *redis_password
      REDIS_DB: 0
    ports:
      - 0.0.0.0:8080:8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - Eco-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:$${PORT}/api/index"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  Eco-network:
    driver: bridge

volumes:
  eco-mysql-data:
  eco-redis-data:
