services:
  mysql:
    container_name: Eco-mysql
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ecohub}
      MYSQL_DATABASE: ${MYSQL_DBNAME:-eco}
      MYSQL_USER: ${MYSQL_USER:-eco}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecohub}
    volumes:
      - ${ECOHUB_DATA_DIR:-${HOME}/.ecohub}/mysql:/var/lib/mysql
    networks:
      - Eco-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    container_name: Eco-redis
    image: redis:7.4-alpine
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecohub}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-ecohub}"]
    volumes:
      - ${ECOHUB_DATA_DIR:-${HOME}/.ecohub}/redis:/data
    networks:
      - Eco-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    container_name: Eco-server
    image: ghcr.io/fe-spark/ecohub-server:${ECOHUB_VERSION:-v1.0.0}
    restart: always
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-ecohub_2026!local@dev_secret$$001}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-eco}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecohub}
      MYSQL_DBNAME: ${MYSQL_DBNAME:-eco}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ecohub}
      REDIS_DB: ${REDIS_DB:-0}
    volumes:
      - ${ECOHUB_DATA_DIR:-${HOME}/.ecohub}/uploads:/app/static/upload
    ports:
      - 127.0.0.1:${SERVER_PUBLIC_PORT:-18080}:8080
    networks:
      - Eco-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    container_name: Eco-web
    image: ghcr.io/fe-spark/ecohub-web:${ECOHUB_VERSION:-v1.0.0}
    restart: always
    environment:
      API_URL: http://server:8080
    ports:
      - ${WEB_PUBLIC_PORT:-3000}:3000
    networks:
      - Eco-network
    depends_on:
      server:
        condition: service_healthy

networks:
  Eco-network:
    driver: bridge
